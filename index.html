<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini API Playground</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Gemini API Playground</h1>
        <p>Simple local prompt testing with <code>gemini-2.5-flash-lite</code>.</p>
      </header>

      <section class="panel">
        <label class="field">
          <span>API Key</span>
          <input
            id="apiKey"
            name="apiKey"
            type="password"
            placeholder="Paste your Gemini API key"
            autocomplete="off"
          />
        </label>

        <label class="field">
          <span>System Instruction (optional)</span>
          <textarea
            id="systemInstruction"
            name="systemInstruction"
            rows="4"
            placeholder="Example: You are a careful translation assistant that keeps nuance and punctuation."
          ></textarea>
        </label>

        <label class="field field-large">
          <span>Prompt</span>
          <textarea
            id="prompt"
            name="prompt"
            rows="10"
            placeholder="Enter the text you want to send"
          ></textarea>
        </label>

        <div class="actions">
          <button id="sendButton" type="button">Send</button>
          <button id="clearButton" type="button" class="button-secondary">Clear</button>
          <span id="status" class="status status-idle">Idle</span>
        </div>
      </section>

      <section class="panel">
        <label class="field">
          <span>Response</span>
          <pre id="output" class="output" aria-live="polite">Response will appear here.</pre>
        </label>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
